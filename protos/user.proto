syntax = "proto3";

package user;

service UserService {
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
  rpc UpdateProfile (UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc GetStats (GetStatsRequest) returns (GetStatsResponse);
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);
  
  // WebAuthn
  rpc WebAuthnRegisterBegin (WebAuthnRegisterBeginRequest) returns (WebAuthnOptionsResponse);
  rpc WebAuthnRegisterComplete (WebAuthnRegisterCompleteRequest) returns (WebAuthnRegisterCompleteResponse);
  rpc WebAuthnLoginBegin (WebAuthnLoginBeginRequest) returns (WebAuthnOptionsResponse);
  rpc WebAuthnLoginComplete (WebAuthnLoginCompleteRequest) returns (WebAuthnLoginCompleteResponse);
}

message User {
  string user_id = 1;
  string email = 2;
  string name = 3;
  Region region = 4;
  KycStatus kyc_status = 5;
  string phone_number = 6;
  bool is_admin = 7;
}

enum Region {
  REGION_UNSPECIFIED = 0;
  REGION_INDIA = 1;
  REGION_EU = 2;
  REGION_US = 3;
}

enum KycStatus {
  KYC_STATUS_UNSPECIFIED = 0;
  KYC_STATUS_PENDING = 1;
  KYC_STATUS_VERIFIED = 2;
  KYC_STATUS_FAILED = 3;
}

message CreateUserRequest {
  string email = 1;
  string name = 2;
  Region region = 3;
  string password = 4;
  string phone_number = 5;
}

message CreateUserResponse {
  User user = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  Region region = 3;
}

message LoginResponse {
  string token = 1;
  User user = 2;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message UpdateProfileRequest {
  string user_id = 1;
  string name = 2;
}

message UpdateProfileResponse {
  User user = 1;
}

message GetStatsRequest {}

message GetStatsResponse {
  int64 total_users = 1;
  int64 total_wallets = 2;
  int64 total_transactions = 3;
  double total_volume = 4;
}

message ListUsersRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
}

// WebAuthn messages
message WebAuthnRegisterBeginRequest {
  string user_id = 1;
}

message WebAuthnOptionsResponse {
  string options_json = 1;
}

message WebAuthnRegisterCompleteRequest {
  string user_id = 1;
  string credential_json = 2;
  string label = 3;
}

message WebAuthnRegisterCompleteResponse {
  bool success = 1;
  string credential_id = 2;
  string label = 3;
}

message WebAuthnLoginBeginRequest {
  string email = 1;
}

message WebAuthnLoginCompleteRequest {
  string assertion_json = 1;
}

message WebAuthnLoginCompleteResponse {
  string token = 1;
  User user = 2;
}
