apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: superapp-prod
spec:
  serviceName: "redis-cluster"
  replicas: 6
  selector:
    matchLabels:
      app: redis-cluster
  template:
    metadata:
      labels:
        app: redis-cluster
    spec:
      containers:
        - name: redis
          image: redis:7.0-alpine
          command:
            - "redis-server"
          args:
            - "--port 6379"
            - "--cluster-enabled yes"
            - "--cluster-config-file nodes.conf"
            - "--cluster-node-timeout 5000"
            - "--appendonly yes"
          ports:
            - containerPort: 6379
              name: client
            - containerPort: 16379
              name: gossip
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
