apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cockroachdb
  namespace: superapp-prod
spec:
  serviceName: "cockroachdb"
  replicas: 3
  selector:
    matchLabels:
      app: cockroachdb
  template:
    metadata:
      labels:
        app: cockroachdb
    spec:
      # Spread replicas across distinct Availability Zones
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: cockroachdb
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v23.1.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 26257
              name: grpc
            - containerPort: 8080
              name: http
          command:
            - "/bin/bash"
            - "-ecx"
            - "exec /cockroach/cockroach start --insecure --advertise-host=$(hostname -f) --http-addr=0.0.0.0 --join=cockroachdb-0.cockroachdb,cockroachdb-1.cockroachdb,cockroachdb-2.cockroachdb --cache=25% --max-sql-memory=25%"
          volumeMounts:
            - name: datadir
              mountPath: /cockroach/cockroach-data
  volumeClaimTemplates:
    - metadata:
        name: datadir
      spec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: 100Gi
