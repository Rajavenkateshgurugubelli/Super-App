worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Global Server Load Balancing Upstream
    # For a real active-active setup, we balance across regions.
    # Here, `gateway` is US, `gateway-eu` is EU.
    # max_fails=1 fail_timeout=5s allows instant circuit breaking to the healthy node.
    upstream superapp_global {
        server gateway:8000 max_fails=1 fail_timeout=5s;
        server gateway-eu:8000 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://superapp_global;
            
            # Preserve Client Context
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
